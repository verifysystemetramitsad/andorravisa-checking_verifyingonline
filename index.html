<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Application Verification Portal">

    <title>Check Status</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="gov-header">

    <div class="gov-top">

        <img src="ga-logo (3).png"
             alt="Govern d'Andorra"
             class="gov-logo">

        <h1 class="gov-title">
            ELECTRONICS HEADQUARTERS
        </h1>

    </div>

    <nav class="gov-nav">
        <a href="https://www.e-tramits.ad/tramits/" target="_blank">
            Home
        </a>
    </nav>

</header>

<div class="page">

    <div class="status-card">

        <header class="card-header">

            <h1 class="card-title">
                Check Status
            </h1>

            <button
                type="button"
                class="close-btn"
                id="close-btn"
                aria-label="Close">
                &times;
            </button>

        </header>

        <div
            id="loading"
            class="card-body loading-panel"
            aria-live="polite">

            <div class="spinner"></div>

            <p>Loading status...</p>

        </div>

        <div
            id="content"
            class="card-body hidden"
            aria-live="polite">

            <dl
                class="status-list"
                id="status-list">
            </dl>

        </div>

        <footer class="card-footer">

            <button
                type="button"
                class="refresh-btn"
                id="refresh-btn">
                REFRESH
            </button>

        </footer>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
